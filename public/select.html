<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose App - Anak Requests</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #eef2ff, #f9fafb);
  }

  .glass {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.7);
  }

  .card {
    transition: all 0.35s ease;
  }

  .card:hover {
    transform: translateY(-8px) scale(1.02);
  }

  .fade-in {
    animation: fadeIn 0.6s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
  }
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

<!-- container -->
<div class="w-full max-w-4xl fade-in">

  <!-- header -->
  <div class="text-center mb-10">
    <img 
      src="https://www.anak-tnk.org/images-ong-enfants-manille/2023/05/Logo-ANAK-Tnk-01-ombre-site-500x200-1.png"
      class="mx-auto mb-6 w-48"
    />

    <h1 class="text-3xl font-bold text-gray-800 mb-2">
      Choose your workspace
    </h1>

    <p class="text-gray-500">
      Select where you want to continue
    </p>
  </div>

  <!-- cards -->
  <div class="grid md:grid-cols-2 gap-6">

    <!-- REQUESTS -->
    <div onclick="goRequests()" 
      class="card glass p-8 rounded-3xl shadow-lg cursor-pointer border border-white/40">

      <div class="text-4xl mb-4">📋</div>

      <h2 class="text-xl font-semibold text-gray-800 mb-2">
        Requests App
      </h2>

      <p class="text-gray-500 mb-6">
        Submit, track and manage your requests
      </p>

      <div class="flex items-center justify-between">
        <span class="text-indigo-600 font-medium">
          Open
        </span>
        <span class="text-xl">→</span>
      </div>
    </div>

    <!-- ADMIN -->
    <div onclick="goAdmin()" 
      class="card glass p-8 rounded-3xl shadow-lg cursor-pointer border border-white/40">

      <div class="text-4xl mb-4">⚙️</div>

      <h2 class="text-xl font-semibold text-gray-800 mb-2">
        Admin Panel
      </h2>

      <p class="text-gray-500 mb-6">
        Validate, control and monitor requests
      </p>

      <div class="flex items-center justify-between">
        <span class="text-gray-800 font-medium">
          Open
        </span>
        <span class="text-xl">→</span>
      </div>
    </div>

  </div>

  <!-- logout -->
  <div class="text-center mt-10">
    <button onclick="logout()" 
      class="text-sm text-gray-400 hover:text-red-500 transition">
      Logout
    </button>
  </div>

</div>

<script>
const API_URL = 'https://anak-requests-api.onrender.com';

// NAVIGATION
function goRequests() {
  window.location.href = '/index.html';
}

function goAdmin() {
  window.location.href = '/admin.html';
}

// LOGOUT
async function logout() {
  await fetch(`${API_URL}/logout`, {
    method: 'POST',
    credentials: 'include'
  });

  window.location.href = 'login.html';
}

// 🔐 CHECK SESSION + ROLE
async function checkSession() {
  try {
    const res = await fetch(`${API_URL}/profile`, {
      credentials: 'include'
    });

    if (!res.ok) {
      window.location.href = 'login.html';
      return;
    }

    const data = await res.json();

    const role = (data.role || '').toLowerCase().trim();

    if (role !== 'admin') {
      window.location.href = 'index.html';
      return;
    }

  } catch (err) {
    window.location.href = 'login.html';
  }
}

checkSession();
</script>

</body>
</html>
