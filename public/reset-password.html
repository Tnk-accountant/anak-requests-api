<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="/favicon_io/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
<link rel="manifest" href="/favicon_io/site.webmanifest">
<title>Reset Password – Anak Requests</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body {
  margin: 0;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background:
    radial-gradient(circle at 20% 20%, #e0e7ff 0%, transparent 40%),
    radial-gradient(circle at 80% 0%, #c7d2fe 0%, transparent 40%),
    linear-gradient(135deg, #f8fafc, #eef2ff);

  color: #1f2937;

  overflow: hidden;
  -webkit-font-smoothing: antialiased;

   background-size: 120% 120%, 120% 120%, 100% 100%;
    animation: backgroundMove 20s ease-in-out infinite;
}

@media (min-width: 900px) {
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.03;
    background-image: url('https://grainy-gradients.vercel.app/noise.svg');
    mix-blend-mode: overlay;
  }
}

@keyframes backgroundMove {
  0% { background-position: 20% 20%, 80% 0%, 0% 0%; }
  50% { background-position: 25% 25%, 75% 5%, 0% 0%; }
  100% { background-position: 20% 20%, 80% 0%, 0% 0%; }
}

.login-container {
  backdrop-filter: blur(14px);
  background: rgba(255,255,255,0.75);

  padding:2rem 1.8rem;
  border-radius:24px;

  border:1px solid rgba(255,255,255,0.6);

  box-shadow:
    0 20px 60px rgba(0,0,0,0.12),
    0 8px 20px rgba(0,0,0,0.08);

  width:100%;
  max-width:420px;

  max-height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;

  text-align:center;
  position:relative;

  transition: all 0.25s ease;
}

.login-container:hover {
  transform: translateY(-4px) scale(1.01);
  box-shadow:
    0 30px 80px rgba(0,0,0,0.15),
    0 10px 25px rgba(0,0,0,0.1);
}

h1 { margin-bottom:0.6rem; font-size:1.8rem; color:#111827; }

.subtitle {
  color:#6b7280;
  font-size:0.9rem;
  margin-bottom:1.6rem;
  line-height:1.5;
}

form { display:flex; flex-direction:column; gap:1rem; }

input {
  padding:0.9rem 1rem;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:14px;
  font-size:1rem;

  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(6px);

  transition: all 0.2s ease;
}

input:focus {
  border-color:#6366f1;
  box-shadow:0 0 0 4px rgba(99,102,241,0.15);
  transform: scale(1.01);
  outline:none;
}

button {
  background: linear-gradient(135deg, #6366f1, #4f46e5);
  color:#fff;

  border:none;
  padding:1rem;
  font-size:1rem;
  font-weight:600;

  border-radius:14px;
  cursor:pointer;

  transition: all 0.25s ease;

  box-shadow:
    0 10px 25px rgba(99,102,241,0.3);
}

button:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow:
    0 15px 35px rgba(99,102,241,0.4);
}

button:active { transform: scale(0.96); }

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.alert {
  margin-top:1rem;
  padding:0.8rem 1rem;
  border-radius:12px;
  font-weight:500;
  color:#b91c1c;
  background:#fee2e2;
  display:none;
}

.success-box {
  margin-top:1rem;
  padding:1rem;
  border-radius:12px;
  font-weight:500;
  color:#065f46;
  background:#d1fae5;
  display:none;
}

.notification-container {
  position:fixed;
  top:1rem; right:1rem;
  display:flex;
  flex-direction:column;
  gap:0.5rem;
  z-index:1000;
}
.notification {
  padding:0.8rem 1rem;
  border-radius:12px;
  color:#fff;
  font-weight:500;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  animation:fadein 0.3s ease;
}
.notification.info { background:#004f9f; }
.notification.success { background:#16a34a; }
.notification.error { background:#b91c1c; }
@keyframes fadein { from {opacity:0; transform:translateY(-10px);} to {opacity:1; transform:translateY(0);} }

#loader {
  position: absolute;
  inset:0;

  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(6px);

  display:none;
  justify-content:center;
  align-items:center;

  font-size:1.1rem;
  font-weight:500;

  color:#4f46e5;

  border-radius:24px;
  z-index:10;
}

.password-wrapper {
  position:relative;
  width:100%;
}

.password-wrapper input {
  width:100%;
  padding-right: 2.5rem;
}

.toggle-password {
  position:absolute;
  top:50%;
  right:0.75rem;
  transform:translateY(-50%);
  display:flex;
  align-items:center;
  justify-content:center;
  width:16px;
  height:16px;
  cursor:pointer;
  color:#555;
  user-select:none;
}
.toggle-password svg { display:block; width:100%; height:100%; }

.back-link {
  margin-top:1.2rem;
  font-size:0.85rem;
  color:#6b7280;
  text-decoration:none;
  display:inline-block;
}
.back-link:hover { color:#4f46e5; }

@media (min-width: 900px) {
  .login-container { max-width: 360px; }
}

@media (max-width: 600px) {
  body { padding: 1rem; align-items: center; justify-content: center; }

  .login-container {
    width:100%;
    max-width:100%;
    padding: 2rem 1.25rem;
    border-radius: 16px;
    margin-top: 0;
  }

  h1 { font-size: 1.5rem; }
  input { font-size: 1rem; padding: 1rem; }
  button { padding: 1rem; font-size: 1.05rem; }

  .toggle-password { width: 24px; height: 24px; right: 1rem; }

  .notification-container { left: 1rem; right: 1rem; top: 0.75rem; }
  .notification { text-align: center; }

  #loader { font-size: 1rem; padding: 1rem; text-align: center; }
}

body { overflow: hidden; }

@media (hover: none) {
  .login-container:hover { transform: none; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
  button:hover { transform: none; box-shadow: 0 6px 15px rgba(43,46,230,0.3); }
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to { opacity:1; transform: translateY(0); }
}

.login-container { animation: fadeUp 0.6s ease; }

</style>
</head>
<body style="font-smooth:always;">
<div class="login-container">
  <div id="loader">⏳ Loading...</div>

  <img
    src="https://www.anak-tnk.org/images-ong-enfants-manille/2023/05/Logo-ANAK-Tnk-01-ombre-site-500x200-1.png"
    alt="Logo Anak"
    style="display:block; margin:0 auto 1.5rem auto; max-width:170px; width:100%; height:auto;"
  />

  <h1 style="font-size:1.6rem; color:#004f9f;">Reset your password</h1>
  <p class="subtitle" id="subtitleText">Choose a new password below.</p>

  <form id="resetForm">
    <div class="password-wrapper">
      <input
        type="password"
        id="newPassword"
        placeholder="New password"
        required
        minlength="6"
        autocomplete="new-password"
      />
      <span class="toggle-password" data-target="newPassword">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M2 12s4-8 10-8 10 8 10 8-4 8-10 8-10-8-10-8z"></path>
        </svg>
      </span>
    </div>

    <div class="password-wrapper">
      <input
        type="password"
        id="confirmNewPassword"
        placeholder="Confirm new password"
        required
        minlength="6"
        autocomplete="new-password"
      />
      <span class="toggle-password" data-target="confirmNewPassword">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M2 12s4-8 10-8 10 8 10 8-4 8-10 8-10-8-10-8z"></path>
        </svg>
      </span>
    </div>

    <button type="submit" id="resetSubmitBtn">Update password</button>
  </form>

  <div class="alert" id="resetAlert"></div>
  <div class="success-box" id="resetSuccess"></div>

  <a href="login.html" class="back-link">← Back to login</a>
</div>

<div id="notificationContainer" class="notification-container"></div>

<script>
const API_URL =
  window.location.hostname === 'localhost'
    ? 'http://localhost:3000'
    : 'https://anak-requests-api.onrender.com';

const loader = document.getElementById('loader');
const notifyContainer = document.getElementById('notificationContainer');
const resetForm = document.getElementById('resetForm');
const resetAlert = document.getElementById('resetAlert');
const resetSuccess = document.getElementById('resetSuccess');
const subtitleText = document.getElementById('subtitleText');

function showLoader(show = true) {
  loader.style.display = show ? 'flex' : 'none';
}

function notify(msg, type = 'info') {
  const note = document.createElement('div');
  note.className = `notification ${type}`;
  note.textContent = msg;
  notifyContainer.appendChild(note);
  setTimeout(() => note.remove(), 4000);
}

// ==============================
// PARSE RECOVERY TOKEN FROM URL
// ==============================
// Supabase redirects here with #access_token=...&refresh_token=...&type=recovery
const hashParams = new URLSearchParams(window.location.hash.substring(1));
const accessToken = hashParams.get('access_token');
const refreshToken = hashParams.get('refresh_token');
const linkType = hashParams.get('type');

const linkIsValid = accessToken && linkType === 'recovery';

if (!linkIsValid) {
  resetForm.style.display = 'none';
  subtitleText.textContent = '';
  resetAlert.innerHTML = '❌ This reset link is invalid or has expired.<br>Please request a new one from the login page.';
  resetAlert.style.display = 'block';
}

// ==============================
// SUBMIT NEW PASSWORD
// ==============================
resetForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  resetAlert.style.display = 'none';

  const newPassword = document.getElementById('newPassword').value;
  const confirmNewPassword = document.getElementById('confirmNewPassword').value;

  if (newPassword !== confirmNewPassword) {
    resetAlert.textContent = '❌ Passwords do not match';
    resetAlert.style.display = 'block';
    return;
  }

  if (newPassword.length < 6) {
    resetAlert.textContent = '❌ Password must be at least 6 characters';
    resetAlert.style.display = 'block';
    return;
  }

  const submitBtn = document.getElementById('resetSubmitBtn');
  submitBtn.disabled = true;
  showLoader(true);

  try {
    const res = await fetch(`${API_URL}/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        access_token: accessToken,
        refresh_token: refreshToken,
        new_password: newPassword
      })
    });

    const data = await res.json();
    showLoader(false);

    if (!res.ok) throw new Error(data.error || 'Server error');

    resetForm.style.display = 'none';
    subtitleText.style.display = 'none';
    resetSuccess.innerHTML = '✅ Your password has been updated!<br>You can now log in with your new password.';
    resetSuccess.style.display = 'block';

    notify('Password updated', 'success');

    setTimeout(() => {
      window.location.href = 'login.html';
    }, 2000);

  } catch (err) {
    showLoader(false);
    resetAlert.textContent = '❌ ' + err.message;
    resetAlert.style.display = 'block';
    notify('Reset failed', 'error');
  } finally {
    submitBtn.disabled = false;
  }
});

// ==============================
// PASSWORD VISIBILITY TOGGLES
// ==============================
document.querySelectorAll('.toggle-password').forEach(toggle => {
  const eyeOpen = `
<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
  <circle cx="12" cy="12" r="3"/>
</svg>`;
  const eyeClosed = `
<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
  <circle cx="12" cy="12" r="3"/>
  <line x1="4" y1="4" x2="20" y2="20"/>
</svg>`;

  toggle.innerHTML = eyeOpen;
  toggle.addEventListener('click', () => {
    const input = document.getElementById(toggle.dataset.target);
    if (input.type === 'password') {
      input.type = 'text';
      toggle.innerHTML = eyeClosed;
    } else {
      input.type = 'password';
      toggle.innerHTML = eyeOpen;
    }
  });
});
</script>
</body>
</html>
