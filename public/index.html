/* =========================
   ACTION PANELS
========================= */

/* Base */
.action-panel {
  display: block;
}

/* Desktop : panels scrollables */
@media (min-width: 768px) {
  .action-panel {
    max-height: 80vh;
    overflow-y: auto;
  }
}

/* Mobile : panels = contenu principal, pas de scroll interne */
@media (max-width: 768px) {
  .action-panel {
    max-height: none;
    overflow: visible;
  }
}

/* =========================
   PAYMENT BUTTONS
========================= */

.payment-btn {
  min-height: 48px;
  padding: 12px 18px;
  font-size: 15px;
  font-weight: 500;
  border-radius: 14px;

  background: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(209, 213, 219, 0.8);
  color: #374151;

  backdrop-filter: blur(8px) saturate(160%);
  box-shadow:
    0 1px 2px rgba(0, 0, 0, 0.04),
    inset 0 1px 0 rgba(255, 255, 255, 0.6);

  transition:
    background-color 160ms ease,
    border-color 160ms ease,
    box-shadow 160ms ease,
    transform 120ms ease;
}

/* Hover (desktop surtout) */
.payment-btn:hover {
  background: rgba(99, 102, 241, 0.08);
  border-color: #6366f1;
  color: #4338ca;
  box-shadow:
    0 6px 14px -6px rgba(99, 102, 241, 0.45),
    inset 0 1px 0 rgba(255, 255, 255, 0.7);
}

/* Active (tap mobile) */
.payment-btn:active {
  transform: scale(0.96);
}

/* État actif */
.payment-active {
  background: linear-gradient(
    180deg,
    rgba(99, 102, 241, 0.18),
    rgba(99, 102, 241, 0.28)
  );
  border-color: #4f46e5;
  color: #1e1b4b;
  box-shadow:
    0 0 0 1px rgba(99, 102, 241, 0.35),
    0 6px 14px -6px rgba(99, 102, 241, 0.45);
}

/* =========================
   CARDS DESKTOP
========================= */

.card-desktop {
  box-shadow:
    0 8px 24px rgba(0, 0, 0, 0.06),
    0 2px 6px rgba(0, 0, 0, 0.04);
}

/* =========================
   MODAL + GRID LAYOUT
========================= */

/* Mobile : modal plein écran fiable */
@media (max-width: 768px) {
  #modal {
    align-items: stretch !important;
  }

  #modal > div {
    height: 100dvh;
    max-height: 100dvh;
  }
}


@media (max-width: 768px) {
  .md\:col-span-7 {
    grid-column: span 12 / span 12;
    overflow: visible;
  }

  #modal > div {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
}


/* Action cards — feedback visuel */
.action-card {
  border-radius: 12px;
  transition:
    background-color 120ms ease,
    box-shadow 120ms ease,
    border-color 120ms ease;
}

/* Tap immédiat (mobile) */
.action-card:active {
  background-color: rgba(99, 102, 241, 0.06);
}

/* État sélectionné (comme Cash / Chèque / CB) */
.action-card.is-active {
  background: rgba(99, 102, 241, 0.08);
  border-color: #6366f1; /* indigo-500 */

}

button:active {

}

/* =========================
   NOTIFICATIONS
========================= */

    .notification-container {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 9999;
    }

    .notification {
      min-width: 250px;
      max-width: 350px;
      padding: 14px 16px;
      border-radius: 14px;
      color: white;
      font-size: 14px;
      display: flex;

    }

    .notification.success { background: #16a34a; }
    .notification.error { background: #dc2626; }
    .notification.info { background: #2563eb; }

    .close-btn {

      border: none;
      color: white;
      font-size: 16px;

    }

    .fade-out {

<script>

  const API_URL = window.location.origin;

  //fetchWithAuth

    async function fetchWithAuth(url, options = {}) {
      let res = await fetch(url, {
        ...options,
        credentials: 'include'
      });

      if (res.status === 401) {

        console.warn("🔁 Access token expiré → refresh");

        // ⚠️ IMPORTANT : fetch NORMAL (PAS fetchWithAuth)
        const refreshRes = await fetch(`${API_URL}/refresh`, {
          method: 'POST',
          credentials: 'include'
        });

        if (refreshRes.ok) {
          res = await fetch(url, {
            ...options,
            credentials: 'include'
          });
        } else {
          window.location.replace('login.html');
          return res;
        }
      }

      return res;
    }

  async function checkSession() {
  try {
    const res = await fetchWithAuth(`${API_URL}/profile`, {
      credentials: 'include'
    });

    if (!res.ok) {
      window.location.replace('login.html');
      return false;
    }

    return true;

  } catch (err) {
    window.location.replace('login.html');
    return false;
  }
}
  let requestorInput, form, status, generatedIdEl, myTableBody, amountSearchInput;

  function notify(message, type = "info") {
    const container = document.getElementById("notificationContainer");
    if (!container) return;

  const el = document.createElement("div");
  el.className = `notification ${type}`;

  const span = document.createElement("span");
  span.textContent = message;

  const close = document.createElement("button");
  close.className = "close-btn";
  close.innerHTML = "&times;";

  el.appendChild(span);
  el.appendChild(close);

  container.appendChild(el);

  setTimeout(() => {
    el.classList.add("fade-out");
    setTimeout(() => el.remove(), 300);
    }, 3000);

    el.querySelector(".close-btn").onclick = () => el.remove();
}

  function lockButton(btn, loadingText = "Processing...") {
    if (!btn) return;

    btn.disabled = true;
    btn.dataset.originalText = btn.innerHTML;

    btn.classList.add("opacity-60", "cursor-not-allowed");
    btn.innerHTML = loadingText;
  }

  function unlockButton(btn) {
    if (!btn) return;

    btn.disabled = false;

    if (btn.dataset.originalText) {
      btn.innerHTML = btn.dataset.originalText;
    }

    btn.classList.remove("opacity-60", "cursor-not-allowed");
  }

  function handleAuthError(res) {
  if (res.status === 401) {
    localStorage.removeItem('user');
    window.location.replace('login.html');
    return true;
  }
  return false;
}

  let isSwitchingPanel = false;
  let activeActionCard = null;
  let capturedPhotos = [];

}

// =============================
// Affichage du profil utilisateur
// =============================
async function displayUserProfile() {
  try {
    const res = await fetchWithAuth(`${API_URL}/profile`, {
      credentials: 'include'
    });

    // 🔒 non authentifié → retour null (le checkSession gère la redirection)
    if (!res.ok) {
      return null;
    }

    const profile = await res.json();

    // -------------------------
    // Affichage UI
    // -------------------------
    const userCenterEl = document.getElementById('userCenter');
    const userEmailEl = document.getElementById('userEmail');

    if (userCenterEl) {
      userCenterEl.textContent = profile.center_name
        ? `Center - ${profile.center_name}`
        : 'Center - —';
    }

    if (userEmailEl) {
      userEmailEl.textContent = profile.email || '';
    }

    const userDisplay = document.getElementById('userDisplay');
    if (userDisplay) {
      userDisplay.classList.remove('hidden');
    }

    // -------------------------
    // Retour du profil
    // -------------------------
    return profile;

  } catch (err) {
    console.error('Erreur displayUserProfile:', err);
    return null;
  }
}

function debounce(fn, delay = 300) {
  let timeout;
  return (...args) => {
    clearTimeout(timeout);
    timeout = setTimeout(() => fn(...args), delay);
  };
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  // ------------------------------
  // Récupération des champs
  // ------------------------------
  const requestor_name = requestorInput.value.trim();
  const center_name = document.getElementById('center_name').value.trim();
  const amount_requested = Number(document.getElementById('amount_requested').value);
  const description = document.getElementById('description').value.trim();
  const payment_method = document.getElementById('payment_method').value;
  const request_type = document.getElementById('request_type').value;

  // ------------------------------
  // Validations
  // ------------------------------
    if (!Number.isFinite(amount_requested) || amount_requested <= 0) {
      notify("Enter a valid amount", "error");
      return;
    }

  if (!payment_method) {
    notify("Select a payment method", "error");
    return;
  }

  if (!request_type) {
    notify("Select a request type", "error");
    return;
  }

  if (!description) {
    notify("Description is required", "error");
    return;
  }

  // ------------------------------
  // Anti double submit/click
  // ------------------------------
    const submitBtn = document.getElementById('submitRequestBtn');

    if (submitBtn?.disabled) return;
    lockButton(submitBtn, "Submitting...");

  // ------------------------------
  // Payload
  // ------------------------------
  const payload = {
    requestor_name,
    center_name,
    amount_requested,
    description,
    payment_method,
    request_type
  };

  console.log('POST /requests payload =>', payload);

  try {
      const res = await fetchWithAuth(`${API_URL}/requests`, {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload) // 🔥 MANQUANT
      });

    // 🔒 token invalide/expiré → redirect login
    if (handleAuthError(res)) {
      return; // ok : finally va quand même se déclencher
    }

    // ------------------------------
    // Parse réponse
    // ------------------------------
    let result = null;

    try {
      result = await res.json();
    } catch {
      const text = await res.text();
      console.warn('Réponse non-JSON du serveur:', text);
      result = { error: 'Réponse non JSON', raw: text };
    }

    console.log('POST /requests response status:', res.status, 'body:', result);

    // ------------------------------
    // Succès
    // ------------------------------
    if (res.ok) {
      notify("Request submitted", "success");


      if (result?.data?.request_id) {
        generatedIdEl.textContent = `ID created: ${result.data.request_id}`;
        upsertRow(result.data);
      }

      // Reset form
      form.reset();

      // Reset boutons UI
      document.querySelectorAll('#paymentMethodButtons button')
      .forEach(b => b.classList.remove('payment-active'));
      paymentInput.value = '';

      document.querySelectorAll('#requestTypeButtons button')
      .forEach(b => b.classList.remove('payment-active'));
      requestTypeInput.value = '';

      // Refresh liste
      await fetchMyRequests();

      return;
    }

    // ------------------------------
    // Erreur serveur
    // ------------------------------
  notify(result?.error || "Server error", "error");

  } catch (err) {
    console.error(err);

    notify("Unable to reach server", "error");

  } finally {
    // ------------------------------
    // Toujours unlock
    // ------------------------------

    unlockButton(submitBtn);
  }
});

let sse = null;
let fallbackInterval = null;

// Fermer SSE si on quitte la page
window.addEventListener('beforeunload', () => {
  if (sse) {
    try { sse.close(); } catch {}
  }
});

// ------------------------------
// Setup SSE
// ------------------------------
function setupSSE() {

  // 🔁 Ferme ancienne connexion
  if (sse) {
    try { sse.close(); } catch {}
    sse = null;
  }

  console.log("🔌 SSE connecting...");

  // ✅ COOKIE (plus de token)
  sse = new EventSource(`${API_URL}/requests/stream`, {
    withCredentials: true
  });

  // ------------------------------
  // MESSAGE
  // ------------------------------
  sse.onmessage = (event) => {
    try {
      const payload = JSON.parse(event.data);
      const requests = Array.isArray(payload) ? payload : [payload];

      requests.forEach(upsertRow);

      renderTable();
      if (window.innerWidth < 768) renderMobileCards();

    } catch (err) {
      console.error('SSE parsing error', err, event.data);
    }
  };

  // ------------------------------
  // OPEN (connexion OK)
  // ------------------------------
  sse.onopen = () => {
    console.log("✅ SSE connected");

    // 🔥 stop fallback si actif
    if (fallbackInterval) {
      clearInterval(fallbackInterval);
      fallbackInterval = null;
      console.log("🟢 fallback stopped");
    }
  };

  // ------------------------------
  // ERROR
  // ------------------------------
  sse.onerror = (err) => {
    console.warn('⚠️ SSE error:', err);

    try { sse.close(); } catch {}
    sse = null;

    // 🟡 fallback ONLY si pas déjà actif
    if (!fallbackInterval) {
      console.log("🟡 fallback polling started");

      fallbackInterval = setInterval(() => {
        fetchMyRequests();
      }, 30000);
    }

    // 🔁 retry SSE
    setTimeout(() => {
      setupSSE();
    }, 5000);
  };
}

function formatAmount(amount) {
  if (amount == null || isNaN(amount)) return '';
  return parseFloat(amount).toLocaleString('en-US', {
    minimumFractionDigits: 0,
    maximumFractionDigits: 2
  });
}

// Fonction pour compresser les images upload lors de la liquidation
  async function compressImage(file, {
    maxWidth = 1600,
    maxHeight = 1600,
    quality = 0.72,
    mimeType = 'image/jpeg'
  } = {}) {
    if (!file || !file.type || !file.type.startsWith('image/')) return file;


    const img = new Image();
    const objectUrl = URL.createObjectURL(file);

    await new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = reject;
      img.src = objectUrl;
    });

    let { width, height } = img;

    const ratio = Math.min(1, maxWidth / width, maxHeight / height);
    const newW = Math.round(width * ratio);
    const newH = Math.round(height * ratio);

    const canvas = document.createElement('canvas');
    canvas.width = newW;
    canvas.height = newH;

    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, newW, newH);

    const blob = await new Promise((resolve) => {
      canvas.toBlob(resolve, mimeType, quality);
    });

    URL.revokeObjectURL(objectUrl);

    if (!blob) return file;

    const ext = mimeType === 'image/png' ? 'png' : 'jpg';
    const newName = file.name.replace(/\.[^.]+$/, '') + `_compressed.${ext}`;

    return new File([blob], newName, { type: mimeType });
  }

    function getAllPhotos() {

      const total = localTotal > 0 ? localTotal : serverTotal;

      if (total === 0) {
        info.textContent = "No receipts";
      } else if (total === 1) {
        info.textContent = "📎 1 receipt";
      } else {
        info.textContent = `📎 ${total} receipts`;
      }
    }

  // ✅ AJOUT ICI (juste après compressImage)
    async function imagesToSinglePDF(files) {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();

      for (let i = 0; i < files.length; i++) {
        const file = files[i];

        const compressed = await compressImage(file);

        const imgData = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result);
          reader.readAsDataURL(compressed);
        });

        const img = new Image();
        await new Promise((res) => {
          img.onload = res;
          img.src = imgData;
        });

        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();

        const ratio = Math.min(pageWidth / img.width, pageHeight / img.height);
        const width = img.width * ratio;
        const height = img.height * ratio;

        if (i !== 0) pdf.addPage();

        pdf.addImage(imgData, 'JPEG', 0, 0, width, height);
      }

      return pdf.output('blob');
    }


  function getMobileRequestsFiltered() {

        });

    }

    return requests;
  }

function renderMobileCards() {

  const start = (mobilePage - 1) * mobilePerPage;

    req.status === 'PendingValidation' ? 'bg-orange-500' :
    req.status === 'Closed' ? 'bg-green-600' :
    req.status === 'PendingCancel' ? 'bg-red-400' :
    req.status === 'Rejected' || req.status === 'Cancelled' ? 'bg-gray-400' :
    'bg-gray-400';

    const card = document.createElement('div');
    card.className = `
      bg-white rounded-lg border px-3 py-2 shadow-sm

    `;

    card.innerHTML = `

          <p class="text-sm font-medium text-gray-800 truncate">
            ${req.requestor_name}

            ${req.timestamp ? new Date(req.timestamp).toLocaleDateString('en-US') : ''}

        </div>

        <div class="flex items-center gap-2 shrink-0">
          <span class="text-sm font-semibold text-gray-700">
            ${formatAmount(req.amount_requested)} ₱
          </span>

          <span class="text-xs text-white px-2 py-0.5 rounded-full ${statusColor}">
            ${req.status}
          </span>

          ${
            req.request_type === 'FundTransfer'
              ? `<span class="text-[11px] font-semibold px-2 py-0.5 rounded-full bg-gray-100 text-gray-600 border border-gray-200">
                  FT
                </span>`
              : ''
          }
        </div>
      </div>
    `;


    card.addEventListener('click', () => openModalFor(req.request_id));
    container.appendChild(card);
  });

  renderMobilePagination(requests.length);
}


function renderMobilePagination(totalItems) {
  const container = document.getElementById('mobilePagination');
  if (!container) return;

  container.innerHTML = '';
  const totalPages = Math.ceil(totalItems / mobilePerPage);
  if (totalPages <= 1) return;

  // ⬅️ Précédent
  const prev = document.createElement('button');
  prev.textContent = '‹';
  prev.className = 'px-3 py-1 rounded bg-gray-200';
  prev.disabled = mobilePage === 1;
  prev.onclick = () => {
    if (mobilePage > 1) {
      mobilePage--;
      renderMobileCards();
    }
  };
  container.appendChild(prev);

  // 🔢 Pages
  for (let i = 1; i <= totalPages; i++) {
    const btn = document.createElement('button');
    btn.textContent = i;
    btn.className = `
      px-3 py-1 rounded
      ${i === mobilePage ? 'bg-indigo-600 text-white' : 'bg-gray-200'}
    `;
    btn.onclick = () => {
      mobilePage = i;
      renderMobileCards();
    };
    container.appendChild(btn);
  }

  // ➡️ Suivant
  const next = document.createElement('button');
  next.textContent = '›';
  next.className = 'px-3 py-1 rounded bg-gray-200';
  next.disabled = mobilePage === totalPages;
  next.onclick = () => {
    if (mobilePage < totalPages) {
      mobilePage++;
      renderMobileCards();
    }
  };
  container.appendChild(next);
}

    // ⚠️ si table desktop pas montée (sécurité)

        ? `<span class="ml-2 px-2 py-0.5 rounded-full text-[11px] font-semibold bg-gray-100 text-gray-600 border border-gray-200">

        : '';

          req.status === 'Pending' ? 'bg-yellow-400' :
          req.status === 'Approved' ? 'bg-blue-500' :
          req.status === 'Rejected' ? 'bg-red-600' :
          req.status === 'ToLiquidate' ? 'bg-purple-500' :
          req.status === 'PendingValidation' ? 'bg-orange-500' :

        }">
          ${req.status || ''}
        </span>
        ${typeChip}
      </div>
    `;


  // Paiement → texte

    req.payment_method === 'cash' ? '💵 Cash' :
    req.payment_method === 'cheque' ? '🧾 Check' :
    req.payment_method === 'card' ? '💳 Card' :

    row.dataset.center = req.center_name || '';

          transition">View</button>

    myTableBody.appendChild(row);

    const voirBtn = row.querySelector('.voirBtn');
    if (voirBtn) {
      voirBtn.addEventListener('click', () => openModalFor(req.request_id));
    }

    return;
  }

  // Sinon : update (ligne existante)
  row.dataset.center = req.center_name || '';

  const statusCell = row.querySelector('.status');
  if (statusCell) statusCell.innerHTML = statusHtml;

  const approvedCell = row.querySelector('.approved_amount');

  const amountCell = row.querySelector('.amount_requested');

  // ✅ correction : mettre à jour le paiement aussi
  const paymentCell = row.querySelector('.payment_method');
  if (paymentCell) paymentCell.textContent = paymentText;
}



/* ==============================
   Récupérer mes demandes (centre connecté)
============================== */
async function fetchMyRequests() {
  try {

    const limit = 200;
    let offset = 0;
    let all = [];
    let hasMore = true;

    while (hasMore) {
      const res = await fetchWithAuth(`${API_URL}/requests?limit=${limit}&offset=${offset}`, {
    credentials: 'include'
      });

      if (handleAuthError(res)) return;

      const result = await res.json();
      if (!res.ok) throw new Error(result?.error || 'Erreur serveur');

      const batch = result.data || [];
      all = all.concat(batch);

      hasMore = result.pagination?.hasMore === true;
      offset += limit;

      // sécurité anti boucle infinie
      if (batch.length === 0) break;
    }

    // Reset DOM + mémoire
    requestsMap.clear();
    myTableBody.innerHTML = '';

    all.forEach(req => upsertRow(req));

    renderTable();

    if (window.innerWidth < 768) {
      mobilePage = 1;
      renderMobileCards();
    }

  } catch (err) {
    console.error('Erreur fetchMyRequests:', err);
  }
}

//==============================================
// TABLEAU : FILTRE MONTANT + PAGINATION (SIMPLE)
//==============================================

let currentPage = 1;
const rowsPerPage = 10; // ajuste si tu veux plus/moins de lignes

function renderTable() {
  const tableBody = document.getElementById('myRequestsTable');
  if (!tableBody) return;

  const rows = Array.from(tableBody.querySelectorAll('tr'));

  // -------------------------------------------
  // Filtrage
  // -------------------------------------------
  let filtered = rows;

  // Filtrer par montant
    const amountValue = parseFloat(amountSearchInput?.value);
    if (!isNaN(amountValue)) {
      filtered = filtered.filter(row => {
        const approvedCell = row.querySelector('.approved_amount');
        const requestedCell = row.querySelector('.amount_requested');

        const approved = approvedCell
          ? parseFloat(approvedCell.textContent.replace(/,/g, '')) 
          : NaN;

        const requested = requestedCell
          ? parseFloat(requestedCell.textContent.replace(/,/g, '')) 
          : NaN;

        // logique : approved si existe, sinon requested
        const rowAmount = !isNaN(approved) && approved > 0 ? approved : (requested || 0);

        return rowAmount === amountValue;
      });
    }


  // -------------------------------------------
  // Pagination
  // -------------------------------------------
  const totalItems = filtered.length;
  const totalPages = Math.ceil(totalItems / rowsPerPage) || 1;

  // Si tu étais sur une page trop loin (après filtre), on revient à la dernière page possible
  if (currentPage > totalPages) {
    currentPage = totalPages;
  }
  if (currentPage < 1) {
    currentPage = 1;
  }

  const start = (currentPage - 1) * rowsPerPage;
  const paginated = filtered.slice(start, start + rowsPerPage);

  // -------------------------------------------
  // Affichage
  // -------------------------------------------
  rows.forEach(r => (r.style.display = 'none'));
  paginated.forEach(r => (r.style.display = ''));

  renderPagination(totalItems);
}

function renderPagination(totalItems) {
  const paginationDiv = document.getElementById('pagination');
  if (!paginationDiv) return;

  paginationDiv.innerHTML = '';

  const totalPages = Math.ceil(totalItems / rowsPerPage);

  // Si 0 ou 1 page : pas besoin d'afficher des boutons
  if (!totalPages || totalPages <= 1) return;

  for (let i = 1; i <= totalPages; i++) {
    const btn = document.createElement('button');
    btn.textContent = i;

    btn.className =
      `px-3 py-1 rounded ` +
      (i === currentPage ? 'bg-indigo-500 text-white' : 'bg-gray-200');

    btn.addEventListener('click', () => {
      currentPage = i;
      renderTable();
    });

    paginationDiv.appendChild(btn);
  }
}
