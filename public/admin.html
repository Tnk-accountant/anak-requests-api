<!-- =================== CSS =================== -->
<style>
.notification-container {
  position: fixed;
  top: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 9999;
}

.notification {
  min-width: 250px;
  max-width: 350px;
  padding: 14px 16px;
  border-radius: 14px;
  color: white;
  font-size: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  animation: slideIn 0.3s ease;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.notification.success { background: #16a34a; }
.notification.error { background: #dc2626; }
.notification.info { background: #2563eb; }

.close-btn {
  background: transparent;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.fade-out {
  opacity: 0;
  transform: translateX(20px);
  transition: all 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}
</style>

</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 p-4 text-sm font-sans min-h-screen">

  <!-- LOADER -->
  <div id="loader" class="fixed inset-0 flex items-center justify-center bg-white z-50">
    <div class="flex flex-col items-center gap-3">
      <div class="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
      <div class="text-gray-500 text-sm">Loading dashboard...</div>
    </div>
  </div>

  <!-- NOTIFICATIONS -->
  <div id="notificationContainer" class="notification-container"></div>

  <!-- WRAPPER -->
  <div class="max-w-[1400px] mx-auto px-4">

    <!-- HEADER -->
    <div class="mb-6 flex items-center justify-between">

      <!-- LEFT -->
      <div class="flex items-center gap-3">

        <button onclick="goBack()"
          class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-gray-200 bg-white hover:bg-gray-50 text-sm text-gray-600 transition shadow-sm">
          ←
        </button>

        <div>
          <h1 class="text-3xl font-bold text-gray-900 tracking-tight">
            Admin Dashboard
          </h1>
          <p class="text-gray-400 text-sm">
            Manage and validate requests efficiently
          </p>
        </div>

      </div>

    </div>

    <!-- TABS -->
    <div class="flex gap-2 mb-6">
      <button id="tabAll"
        class="tab-btn px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 bg-indigo-600 text-white shadow-sm hover:shadow-md active:scale-95">
        All Requests
      </button>

      <button id="tabLiquidation"
        class="tab-btn px-5 py-2.5 rounded-xl text-sm font-medium transition bg-gray-100 text-gray-600 hover:bg-gray-200 active:scale-95">
        Liquidations / Cancellation
      </button>
    </div>

    <!-- FILTER CARD -->
    <div class="bg-white/80 backdrop-blur border border-gray-200 rounded-2xl p-4 mb-6 shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">

      <!-- LEFT -->
      <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">

        <input id="searchName" type="text" placeholder="Requested by"
          class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition w-full sm:w-48">

        <input id="searchCenter" type="text" placeholder="Center"
          class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition w-full sm:w-48">

        <input id="minAmount" type="number" placeholder="Amount ="
          class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition w-full sm:w-32">

        <!-- TOTAL -->
        <div class="bg-white border border-gray-200 rounded-xl px-4 py-2 shadow-sm">
          <div class="text-xs text-gray-400">
            Total To Liquidate
          </div>
          <div id="totalToLiquidate" class="text-sm font-semibold text-gray-800">
            0.00 PHP

      </div>

      <!-- RIGHT -->
      <div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto md:justify-end">

        <select id="filterStatus"
          class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition w-full sm:w-auto">
          <option value="">All statuses</option>
          <option value="Pending">Pending</option>
          <option value="Approved">Approved</option>
          <option value="Rejected">Rejected</option>
          <option value="ToLiquidate">To liquidate</option>
          <option value="PendingValidation">Pending Validation</option>
          <option value="Closed">Closed</option>

        <button id="refreshBtn"
          class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition shadow-sm hover:shadow-md active:scale-95">

        <button id="exportBtn"
          class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg transition shadow-sm hover:shadow-md active:scale-95">
          Export
        </button>

      </div>

    </div>

    <!-- TABLE -->
    <div class="overflow-x-auto bg-white rounded-2xl shadow-sm border border-gray-200">
      <table class="min-w-full text-left border-collapse">

          <tr>
            <th class="py-3 pl-6 pr-4 text-gray-500 font-medium text-xs uppercase">ID</th>
            <th class="py-3 px-4 text-gray-500 font-medium text-xs uppercase">Date</th>
            <th class="py-3 px-4 text-gray-500 font-medium text-xs uppercase">Requested by</th>
            <th class="py-3 px-4 text-gray-500 font-medium text-xs uppercase">Center</th>
            <th class="py-3 px-4 text-gray-500 font-medium text-xs uppercase">Amount</th>
            <th class="py-3 px-4 text-gray-500 font-medium text-xs uppercase">Payment</th>
            <th class="py-3 px-4 text-gray-500 font-medium text-xs uppercase">Description</th>
            <th class="py-3 px-4 text-gray-500 font-medium text-xs uppercase">Status</th>
            <th class="py-3 px-4 text-gray-500 font-medium text-xs uppercase">Approved</th>
            <th class="py-3 px-4 text-gray-500 font-medium text-xs uppercase">By</th>
            <th class="py-3 px-2 text-gray-500 font-medium text-xs uppercase text-center">Actions</th>
          </tr>
        </thead>

        <tbody id="requestsTableBody" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>

    <!-- PAGINATION -->
    <div class="flex justify-center items-center mt-6 gap-3">
      <button id="prevPage"
        class="bg-white border border-gray-200 px-4 py-2 rounded-lg hover:bg-gray-50 transition">
        Previous

        class="bg-white border border-gray-200 px-4 py-2 rounded-lg hover:bg-gray-50 transition">

      </button>

  </div>

  <!-- MODAL -->
  <div id="descriptionModal"
       class="fixed inset-0 bg-black/30 hidden flex items-center justify-center z-50">

                class="text-gray-400 hover:text-gray-600">✕</button>

  <script>

  function notify(message, type = "info") {
  const container = document.getElementById("notificationContainer");
  if (!container) return;

  const el = document.createElement("div");
  el.className = `notification ${type}`;

  const span = document.createElement("span");
  span.textContent = message;

  const close = document.createElement("button");
  close.className = "close-btn";
  close.innerHTML = "&times;";

  el.appendChild(span);
  el.appendChild(close);
  container.appendChild(el);

  setTimeout(() => {
    el.classList.add("fade-out");
    setTimeout(() => el.remove(), 300);
  }, 3000);

  close.onclick = () => el.remove();
}

    let activeTab = 'all';

    const tabAll = document.getElementById('tabAll');
    const tabLiquidation = document.getElementById('tabLiquidation');

    tabAll.addEventListener('click', () => {
      activeTab = 'all';
      tabAll.classList.add('bg-indigo-600', 'text-white');
      tabAll.classList.remove('bg-gray-200');

      tabLiquidation.classList.remove('bg-indigo-600', 'text-white');
      tabLiquidation.classList.add('bg-gray-200');

      applyAdvancedFilters();
    });

    tabLiquidation.addEventListener('click', () => {
      activeTab = 'liquidation';
      tabLiquidation.classList.add('bg-indigo-600', 'text-white');
      tabLiquidation.classList.remove('bg-gray-200');

      tabAll.classList.remove('bg-indigo-600', 'text-white');
      tabAll.classList.add('bg-gray-200');

      applyAdvancedFilters();
    });

const API_URL = 'https://anak-requests-api.onrender.com';

    function goBack() {
      window.location.href = '/select.html';
    }

    function hideLoader() {
      const loader = document.getElementById('loader');
      if (!loader) return;

      loader.style.transition = 'opacity 0.3s ease';
      loader.style.opacity = '0';

      setTimeout(() => {
        loader.style.display = 'none';
      }, 300);
    }

    async function checkAdminAccess() {
      try {
        const res = await fetch(`${API_URL}/profile`, {
          credentials: 'include'
        });

        if (!res.ok) {
          hideLoader(); // 👈 ajoute ça
          window.location.href = 'login.html';
          return;
        }

        const data = await res.json();

        const role = (data.role || '').toLowerCase().trim();

        console.log("ADMIN ROLE:", role); // debug

      if (role !== 'admin') {
        hideLoader();
        window.location.href = 'select.html';
        return;
      }

      hideLoader(); // ✅ IMPORTANT

      } catch (err) {
        console.error(err);
         hideLoader(); 
        window.location.href = 'login.html';
      }
    }

    async function initAdminPage() {
      await checkAdminAccess(); // 🔒 vérifie admin AVANT tout

      fetchRequests();          // 📊 charge les données
      setupSSE();               // 🔁 active le temps réel
    }

    initAdminPage();

    const requestsTableBody = document.getElementById('requestsTableBody');
    const filterStatus = document.getElementById('filterStatus');
    const refreshBtn = document.getElementById('refreshBtn');
    const searchName = document.getElementById('searchName');
    const searchCenter = document.getElementById('searchCenter');
    const minAmount = document.getElementById('minAmount');
    let allRequests = [];
    let currentPage = 1;
    const rowsPerPage = 20;
    let filteredRequests = [];
    const currentAdmin = "Father";

    const statusClasses = {
      Pending: 'bg-yellow-400',
      Approved: 'bg-blue-500',
      Rejected: 'bg-red-600',
      ToLiquidate: 'bg-purple-500',
      PendingValidation: 'bg-orange-500',
      Closed: 'bg-green-600',
      PendingCancel: 'bg-red-400',
      Cancelled: 'bg-gray-400',
    };

  function setRowActionState(req, row) {
  const input = row.querySelector('.approvedAmount');
  const approveBtn = row.querySelector('.approveBtn');
  const rejectBtn = row.querySelector('.rejectBtn');

  if (!input || !approveBtn || !rejectBtn) return;

  // Reset classes
  input.classList.remove('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
  approveBtn.classList.remove('opacity-50', 'cursor-not-allowed');
  rejectBtn.classList.remove('opacity-50', 'cursor-not-allowed');

  // Reset disabled
  input.readOnly = true;
  approveBtn.disabled = true;
  rejectBtn.disabled = true;

  // Valeur affichée
  if (req.approved_amount != null) {
    input.value = formatAmount(req.approved_amount);
    input.dataset.raw = req.approved_amount;
  } else {
    input.value = '';
    input.dataset.raw = '';
  }

  // Pending => editable + boutons actifs
  if (req.status === 'Pending') {
    input.readOnly = false;    
    approveBtn.disabled = false;
    rejectBtn.disabled = false;
    return;
  }

  // Approved => lecture seule (dblclick gère l'édition)
    if (req.status === 'Approved') {
      input.readOnly = true;
      input.classList.add('opacity-50'); // plus de cursor-not-allowed

      approveBtn.disabled = true;
      rejectBtn.disabled = true;
      approveBtn.classList.add('opacity-50', 'cursor-not-allowed');
      rejectBtn.classList.add('opacity-50', 'cursor-not-allowed');
      return;
    }

  // Autres statuts => tout bloqué
  input.readOnly = true;
  input.classList.add('opacity-50', 'cursor-not-allowed');

  approveBtn.disabled = true;
  rejectBtn.disabled = true;
  approveBtn.classList.add('opacity-50', 'cursor-not-allowed');
  rejectBtn.classList.add('opacity-50', 'cursor-not-allowed');
}


    function formatAmount(value) {
      if (value === null || value === undefined || value === '') return '';
      return new Intl.NumberFormat('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }).format(Number(value));
    }

    function updateToLiquidateSummary() {
      const list = allRequests.filter(r => r.status === "ToLiquidate");

      const total = list.reduce((sum, r) => {
        const value = Number(r.approved_amount || 0);
        return sum + (isNaN(value) ? 0 : value);
      }, 0);

      document.getElementById("totalToLiquidate").textContent =
        `${formatAmount(total)} PHP`;
    }

    function applyAdvancedFilters() {
      let filtered = [...allRequests];

      // 🔥 NOUVEAU : filtre par onglet
    if (activeTab === 'liquidation') {
      filtered = filtered.filter(r =>
        r.status === 'PendingValidation' ||
        r.status === 'PendingCancel'
      );
    }

      // ✅ Filtre statut (important pour SSE)
     if (filterStatus.value && activeTab === 'all') {
        filtered = filtered.filter(r => r.status === filterStatus.value);
      }
      // Filtre demandeur
      const nameQuery = searchName.value.trim().toLowerCase();
      if (nameQuery) {
        filtered = filtered.filter(r =>
          (r.requestor_name || '').toLowerCase().includes(nameQuery)
        );
      }
      // Filtre centre
      const centerQuery = searchCenter.value.trim().toLowerCase();
      if (centerQuery) {
        filtered = filtered.filter(r =>
          (r.center_name || '').toLowerCase().includes(centerQuery)
        );
      }
      // Filtre montant approuvé (=)
      if (minAmount.value) {
        const amount = parseFloat(minAmount.value);

        filtered = filtered.filter(r => {
          const approved = Number(r.approved_amount || 0);
          const requested = Number(r.amount_requested || 0);

          const value = approved > 0 ? approved : requested;
          return value === amount;
        });
      }

      // Fallback : si aucun résultat → afficher tout
      filteredRequests = filtered;

      currentPage = 1; 
      renderPage();
      updatePaginationInfo();
    }


    searchName.addEventListener('input', applyAdvancedFilters);
    searchCenter.addEventListener('input', applyAdvancedFilters);
    minAmount.addEventListener('input', applyAdvancedFilters);

    async function fetchRequests() {
    try {
    // Construire l'URL de la requête
   let url = `${API_URL}/requests`;
    if (filterStatus.value) url += `?status=${filterStatus.value}`;

    // Appel à l'API avec token
    const res = await fetch(url, {
      headers: {
        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
      }
    });

    // Vérifie si le token est invalide ou expiré
  if (res.status === 401) {
    localStorage.removeItem('access_token');
    window.location.href = 'login.html';
    return;
  }

    const data = await res.json();
    allRequests = data.data || [];
    applyAdvancedFilters();
    updateToLiquidateSummary();


    } catch (err) {
    console.error('fetchRequests error:', err);
    notify("Unable to fetch requests", "error");
    }
    }

    // Écoute des changements pour filtrage et rafraîchissement
    filterStatus.addEventListener('change', fetchRequests);
    refreshBtn.addEventListener('click', fetchRequests);


  function renderTable(data) {
    
  requestsTableBody.innerHTML = '';
  data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  data.forEach(req => {
    const tr = document.createElement('tr');
    tr.className = 'group text-sm text-gray-700 border-b border-gray-100 transition-colors duration-75 hover:bg-gray-50 hover:border-l-gray-200';


    tr.innerHTML = `
      <td class="pl-6 pr-4 font-medium text-gray-700">${req.request_id}</td>
      <td>${new Date(req.timestamp).toLocaleDateString('fr-FR')}</td>
      <td>${req.requestor_name}</td>
      <td>${req.center_name}</td>
      <td>${formatAmount(req.amount_requested)}</td>

      <td>
        <span class="px-2 py-1 rounded-full text-xs font-semibold
          ${req.payment_method === 'cash' ? 'bg-green-100 text-green-700' :
            req.payment_method === 'cheque' ? 'bg-yellow-100 text-yellow-700' :
            req.payment_method === 'card' ? 'bg-blue-100 text-blue-700' :
            'bg-gray-100 text-gray-500'}">
          ${
            req.payment_method === 'cash' ? '💵 Cash' :
            req.payment_method === 'cheque' ? '🧾 Check' :
            req.payment_method === 'card' ? '💳 Card' : '—'
          }
        </span>
      </td>

      <td class="text-left">
        ${req.description
          ? `
            <div class="relative group inline-block">
              <span class="text-gray-400 hover:text-indigo-600 text-sm cursor-pointer">
                View description
              </span>

              <div class="pointer-events-none opacity-0 translate-y-2 
                          group-hover:opacity-100 group-hover:translate-y-0 
                          transition-all duration-200 ease-out
                          absolute left-0 mt-2 z-50 w-64 bg-white shadow-xl rounded-xl p-3 text-sm text-gray-700">
                ${req.description}
              </div>
            </div>
          `
          : `<span class="text-gray-300">—</span>`
        }
      </td>

      <td class="status-cell">
        <div class="flex items-center gap-2">
          <span class="px-2 py-1 rounded-full text-white text-sm ${statusClasses[req.status] || ''}">
            ${req.status || ''}
          </span>

          ${
            req.request_type === 'FundTransfer'
              ? `<span class="text-[11px] font-semibold px-2 py-0.5 rounded-full bg-gray-100 text-gray-600 border border-gray-200">
                  FT
                </span>`
              : ''
          }
        </div>
      </td>


      <td class="approved-amount-cell">
        ${req.approved_amount != null ? formatAmount(req.approved_amount) : ''}
      </td>

      <td class="approved-by-cell">${req.approved_by || ''}</td>

      <td class="actions-cell flex justify-center items-center gap-1 p-1 cursor-pointer">
          <input type="text" class="approvedAmount w-20 p-1 border rounded" />

          <button class="approveBtn bg-green-500 text-white px-2 py-1 rounded hover:bg-green-600">✅</button>
          <button class="rejectBtn bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600">❌</button>

      ${
        activeTab === 'liquidation' && req.status === 'PendingValidation'
          ? `<button class="validateBtn bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700">Validate</button>`
          : ''
        }
        ${
          activeTab === 'liquidation' && req.status === 'PendingCancel'
            ? `<button class="validateCancelBtn bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700">
                Validate Cancel
              </button>`
            : ''
        }
      </td>
    `;

    requestsTableBody.appendChild(tr);

        const approveBtn = tr.querySelector('.approveBtn');
        const rejectBtn = tr.querySelector('.rejectBtn');
        const approvedAmountInput = tr.querySelector('.approvedAmount');

        const validateBtn = tr.querySelector('.validateBtn');
        const validateCancelBtn = tr.querySelector('.validateCancelBtn');


        // PRESS TOUCH ENTER => VALID  THE AMOUNT
        approvedAmountInput.addEventListener('keydown', async (e) => {
        if (e.key !== 'Enter') return;

        e.preventDefault();

        // 🔒 empêche si bouton désactivé (sécurité)
        if (approveBtn.disabled) return;

        let approved_amount = Number(
          approvedAmountInput.value.replace(/,/g, '')
        );

        if (isNaN(approved_amount) || approved_amount <= 0) {
          notify("Invalid approved amount", "error");
          return;
        }

        if (approved_amount > req.amount_requested) {
          approved_amount = req.amount_requested;
        }

        disableButtons([approveBtn, rejectBtn]);

        await updateRequest(
          req,
          'Approved',
          currentAdmin,
          approved_amount,
          tr
        );

        enableButtons([approveBtn, rejectBtn]);
      });

        // 🔥 ONGLET LIQUIDATION → UI CLEAN
      if (activeTab === 'liquidation') {
        if (approveBtn) approveBtn.style.display = 'none';
        if (rejectBtn) rejectBtn.style.display = 'none';
        if (approvedAmountInput) approvedAmountInput.style.display = 'none';
      }


      //Validation btn vert dans liquidation 

      if (validateBtn) {
          validateBtn.addEventListener('click', async () => {

            // 🚫 empêche double clic
            if (validateBtn.disabled) return;

            validateBtn.disabled = true;
            validateBtn.classList.add('opacity-50', 'cursor-not-allowed');
            validateBtn.textContent = '⏳...';

            try {
              const token = localStorage.getItem('access_token');

              const res = await fetch(`${API_URL}/requests/${req.request_id}/validate-liquidation`, {
                method: 'PATCH',
                headers: {
                  'Authorization': 'Bearer ' + token
                }
              });

              if (res.status === 401) {
                localStorage.removeItem('access_token');
                window.location.href = 'login.html';
                return;
              }

              const result = await res.json();

              if (!res.ok) {
                // 🔁 réactive si erreur
                validateBtn.disabled = false;
                validateBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                validateBtn.textContent = '✅ Validate';

                notify(result.error || "Error validating", "error");
                return;
              }

              // ✅ succès
              req.status = 'Closed';

              tr.style.transition = 'all 0.3s ease';
              tr.style.opacity = '0';

              setTimeout(() => {
                applyAdvancedFilters();
              }, 300);

              updateToLiquidateSummary();

              notify("Liquidation validated", "success");

            } catch (err) {
              console.error(err);

              // 🔁 réactive si crash
              validateBtn.disabled = false;
              validateBtn.classList.remove('opacity-50', 'cursor-not-allowed');
              validateBtn.textContent = '✅ Validate';

              notify("Server error", "error");
            }
          });
        }

          if (validateCancelBtn) {
            validateCancelBtn.addEventListener('click', async () => {

              // 🔥 AJOUT ICI
              if (req.status !== 'PendingCancel') return;

              if (validateCancelBtn.disabled) return;

              validateCancelBtn.disabled = true;
              validateCancelBtn.classList.add('opacity-50');
              validateCancelBtn.textContent = '⏳...';

            try {
              const token = localStorage.getItem('access_token');

              const res = await fetch(`${API_URL}/requests/${req.request_id}/validate-cancel`, {
                method: 'PATCH',
                headers: {
                  'Authorization': 'Bearer ' + token
                }
              });

              if (res.status === 401) {
                localStorage.removeItem('access_token');
                window.location.href = 'login.html';
                return;
              }

              const result = await res.json();

              if (!res.ok) {
                validateCancelBtn.disabled = false;
                validateCancelBtn.textContent = '❌ Validate Cancel';
                notify(result.error || "Error", "error");
                return;
              }

              // ✅ update local
              const updated = result?.data || req;
              req.status = updated.status || 'Cancelled';

              tr.style.transition = 'all 0.3s ease';
              tr.style.opacity = '0';

              setTimeout(() => {
                applyAdvancedFilters();
              }, 300);

              notify("Request cancelled", "success");

            } catch (err) {
              console.error(err);

              validateCancelBtn.disabled = false;
              validateCancelBtn.textContent = '❌ Validate Cancel';

              notify("Server error", "error");
            }
          });
        }

        // Appliquer état initial propre
        setRowActionState(req, tr);

        // Double click => édition uniquement si Approved
          tr.addEventListener('dblclick', () => {
            if (req.status !== 'Approved') return;

            approvedAmountInput.readOnly = false;
            approvedAmountInput.value = approvedAmountInput.dataset.raw || '';

            approvedAmountInput.classList.remove('opacity-50', 'cursor-not-allowed');

            approveBtn.disabled = false;
            rejectBtn.disabled = false;

            approveBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            rejectBtn.classList.remove('opacity-50', 'cursor-not-allowed');

            approvedAmountInput.focus();
          });



        if (approveBtn) {
        approveBtn.addEventListener('click', async () => {
          let approved_amount = Number(
            approvedAmountInput.value.replace(/,/g, '')
          );

          if (isNaN(approved_amount) || approved_amount <= 0) {
            notify("Invalid approved amount", "error");
            return;
          }

          if (approved_amount > req.amount_requested) {
            approved_amount = req.amount_requested;
          }

          disableButtons([approveBtn, rejectBtn]);
          await updateRequest(
            req,
            'Approved',
            currentAdmin,
            approved_amount,
            tr
            );
          enableButtons([approveBtn, rejectBtn]);
        });
        }

        rejectBtn.addEventListener('click', async () => {
          disableButtons([approveBtn, rejectBtn]);
          await updateRequest(req, 'Rejected', currentAdmin, null, tr);
          enableButtons([approveBtn, rejectBtn]);
        });
      });
    }

    function renderPage() {
      const start = (currentPage-1)*rowsPerPage;
      const paginatedData = filteredRequests.slice(start, start+rowsPerPage);
      renderTable(paginatedData);
    }

    const prevPageBtn = document.getElementById('prevPage');
    const nextPageBtn = document.getElementById('nextPage');
    const pageInfo = document.getElementById('pageInfo');

    function updatePaginationInfo() {
      const totalPages = Math.max(1, Math.ceil(filteredRequests.length / rowsPerPage));

      if (currentPage > totalPages) currentPage = totalPages;

      pageInfo.textContent = `Page ${currentPage} / ${totalPages}`;
      prevPageBtn.disabled = currentPage === 1;
      nextPageBtn.disabled = currentPage === totalPages;
    }


    prevPageBtn.addEventListener('click', () => { if(currentPage>1){currentPage--; renderPage(); updatePaginationInfo();} });
    nextPageBtn.addEventListener('click', () => { const totalPages=Math.ceil(filteredRequests.length/rowsPerPage); if(currentPage<totalPages){currentPage++; renderPage(); updatePaginationInfo();} });

    async function updateRequest(req, status, approved_by, approved_amount, row) {
    try {
    const bodyData = { status, approved_by };
    if (approved_amount !== null) bodyData.approved_amount = approved_amount;

    const res = await fetch(`${API_URL}/requests/${req.request_id}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem('access_token')}` // Ajout du token
      },
      body: JSON.stringify(bodyData)
    });

    // Vérifie si le token est invalide
    if (res.status === 401) {
      localStorage.removeItem('access_token');
      window.location.href = 'login.html';
      return;
    }

    const result = await res.json();

    if (!result.error) {

      req.status = status;
      req.approved_by = approved_by;
      req.approved_amount = approved_amount;


      // 1️⃣ Mise à jour de l'affichage
      const statusCell = row.querySelector('.status-cell span');
      statusCell.textContent = status;
      statusCell.className = `px-2 py-1 rounded-full text-white text-sm ${statusClasses[status] || ''}`;

      row.querySelector('.approved-by-cell').textContent = approved_by || '';

      row.querySelector('.approved-amount-cell').textContent =
        approved_amount != null ? formatAmount(approved_amount) : '';


      // 2️⃣ 🔒 Verrouillage automatique APRÈS mise à jour
      const input = row.querySelector('.approvedAmount');
      const approveBtn = row.querySelector('.approveBtn');
      const rejectBtn = row.querySelector('.rejectBtn');

      if (input) {
        input.readOnly = true;
        input.classList.add(
          'opacity-50',
          'cursor-not-allowed'
        );
      }

      if (approveBtn) {
        approveBtn.disabled = true;
        approveBtn.classList.add('opacity-50', 'cursor-not-allowed');
      }

      if (rejectBtn) {
        rejectBtn.disabled = true;
        rejectBtn.classList.add('opacity-50', 'cursor-not-allowed');
      }

      updateToLiquidateSummary();
      setRowActionState(req, row);


    } else {
      notify(result.error || "Error", "error");
    }


    
    } catch (err) {
    console.error(err);
    notify("Unable to reach server", "error");
    }
    }

    // Fonctions utilitaires pour activer/désactiver les boutons
    function disableButtons(buttons) {
      buttons.forEach(btn => (btn.disabled = true));
    }

    function enableButtons(buttons) {
      buttons.forEach(btn => (btn.disabled = false));
    }

     // Export Excel
      const exportBtn = document.getElementById('exportBtn');

      exportBtn.addEventListener('click', () => {
        if (!filteredRequests.length) {
          notify("No data to export", "error");
          return;
        }

        const wsData = filteredRequests.map(r => ({
          ID: r.request_id,
          Date: new Date(r.timestamp).toLocaleDateString('en-US'),
          "Requested by": r.requestor_name,
          Center: r.center_name,
          Type: r.request_type === "FundTransfer" ? "FT" : "CA",

          "Requested amount": r.amount_requested,
          "Approved amount": r.approved_amount,
          "Amount spent": r.amount_spent,
          "Returned amount": r.returned_amount,

          Description: r.description || '',
          Status: r.status,
          "Approved by": r.approved_by || ''
        }));

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(wsData);

        XLSX.utils.book_append_sheet(wb, ws, "Requests");
        XLSX.writeFile(wb, "Anak_Requests.xlsx");
      });

    let evtSource = null;
    let sseReconnectTimer = null;

// -------------------------
// SSE — mises à jour en temps réel (admin) + reconnexion auto
// -------------------------
    function setupSSE() {
      const token = localStorage.getItem('access_token');

      // pas de token → pas de SSE
      if (!token) {
        console.warn("SSE non lancé : aucun token trouvé.");
        return;
      }

      // 🔁 éviter doublons : fermer l’ancienne connexion
      if (evtSource) {
        try { evtSource.close(); } catch {}
        evtSource = null;
      }

      // 🔁 annuler un timer de reconnexion si existant
      if (sseReconnectTimer) {
        clearTimeout(sseReconnectTimer);
        sseReconnectTimer = null;
      }

      // Création EventSource
      evtSource = new EventSource(
        `${API_URL}/requests/stream?token=${encodeURIComponent(token)}`
      );

      evtSource.onmessage = (event) => {
        try {
          const payload = JSON.parse(event.data);
          const requests = Array.isArray(payload) ? payload : [payload];

          requests.forEach((req) => {
            const exists = allRequests.some(r => r.request_id === req.request_id);

            if (!exists) {
              allRequests.unshift(req);
            } else {
              allRequests = allRequests.map(r =>
                r.request_id === req.request_id ? req : r
              );
            }
          });

          // Re-render avec filtres + pagination
          applyAdvancedFilters();
          updateToLiquidateSummary();


        } catch (err) {
          console.error("Erreur parsing SSE:", err, event.data);
        }
      };

      evtSource.onerror = (err) => {
        console.warn("SSE error:", err);

        // ferme proprement
        if (evtSource) {
          try { evtSource.close(); } catch {}
          evtSource = null;
        }

        // 🔁 reconnexion après 5 secondes
        sseReconnectTimer = setTimeout(() => {
          setupSSE();
        }, 5000);
      };
    }

    // -------------------------
    // Modal description (1 seule fois)
    // -------------------------
    const modal = document.getElementById('descriptionModal');
    const closeBtn = document.getElementById('closeDescription');

    function closeModal() {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    closeBtn.addEventListener('click', closeModal);

    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });


  </script>
